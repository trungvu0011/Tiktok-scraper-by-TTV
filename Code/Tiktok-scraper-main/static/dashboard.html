<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TikTok Scraper — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Light theme — see redesign "Pro" spec */
    --bg:#eef0f3; --bg2:#ffffff; --card:#ffffff; --card2:#fafafb;
    --line:#ececee; --line2:#f0f0f1;
    --fg:#16181d; --muted:#8b9096; --muted2:#aab0b7;
    --pink:#fe2c55; --pink2:#F02C56; --blue:#2f6df6; --cyan:#2f6df6;
    --green:#17b26a; --amber:#f59e0b;
    --ink:#16181d;                 /* dark accent (active/highlight) */
    --input:#f7f7f8;
    --shadow:0 1px 3px rgba(16,24,40,.06), 0 1px 2px rgba(16,24,40,.04);
    --shadow2:0 8px 30px rgba(16,24,40,.10);
    --mono:'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans:'Hanken Grotesk', -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color:var(--fg); min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  /* numbers use mono */
  .metric .v, td.num, .pf-stat b, .count-pill b, .mono { font-family: var(--mono); }

  /* scrollbars */
  .scrl::-webkit-scrollbar, .tablewrap::-webkit-scrollbar,
  .modal-body::-webkit-scrollbar, pre::-webkit-scrollbar { width:10px; height:10px; }
  .scrl::-webkit-scrollbar-thumb, .tablewrap::-webkit-scrollbar-thumb,
  .modal-body::-webkit-scrollbar-thumb, pre::-webkit-scrollbar-thumb {
    background:#dcdde0; border-radius:8px; border:3px solid var(--card); }
  .scrl::-webkit-scrollbar-track { background:transparent; }

  /* =============================================== app shell ============= */
  .app { display:flex; min-height:100vh; }

  .sidebar { width:260px; flex:none; background:var(--bg2); border-right:1px solid var(--line);
             display:flex; flex-direction:column; position:sticky; top:0; height:100vh; }
  .brand { display:flex; align-items:center; gap:11px; padding:20px 22px 18px; }
  .brand .logo { width:38px; height:38px; border-radius:10px; flex:none; position:relative;
          background:var(--ink); display:grid; place-items:center; }
  .brand .logo svg { width:18px; height:18px; }
  .brand .logo .pip { position:absolute; right:-2px; bottom:-2px; width:11px; height:11px;
          border-radius:50%; background:var(--pink); border:2px solid var(--bg2); }
  .brand .bn { font-size:15px; font-weight:800; letter-spacing:-.01em; }
  .brand .bs { font-size:11px; color:var(--muted2); font-family:var(--mono); margin-top:1px; }

  .nav { flex:1; overflow-y:auto; padding:6px 14px 14px; }
  .nav-label { font-size:11px; font-weight:700; letter-spacing:.08em; color:var(--muted2);
               padding:16px 10px 8px; }
  .nav-item { display:flex; align-items:center; gap:12px; width:100%; text-align:left;
              padding:11px 12px; border-radius:11px; font-size:14px; font-weight:600;
              color:#3f444b; background:transparent; transition:.12s; position:relative; }
  .nav-item svg { width:18px; height:18px; flex:none; stroke:currentColor; }
  .nav-item:hover { background:var(--card2); color:var(--fg); }
  .nav-item.active { background:#fff5f7; color:var(--pink2); box-shadow:inset 3px 0 0 var(--pink2); }
  .nav-item .grow { flex:1; }
  .nav-item .hint { font-size:11px; color:var(--muted2); font-family:var(--mono); }
  .nav-item .badge { font-size:10px; font-weight:800; letter-spacing:.04em; color:#fff;
              background:var(--pink2); padding:2px 7px; border-radius:7px; line-height:1.4; }
  .nav-item.active .hint { color:var(--pink2); }

  .side-foot { margin:14px; padding:14px 16px; border:1px solid var(--line); border-radius:13px;
               background:var(--card2); }
  .side-foot .row { display:flex; align-items:center; gap:8px; font-size:13px; font-weight:700; }
  .side-foot .dotlive { width:8px; height:8px; border-radius:50%; background:var(--green); }
  .side-foot .meta { font-size:11.5px; color:var(--muted2); font-family:var(--mono); margin-top:6px; line-height:1.5; }

  .main { flex:1; min-width:0; display:flex; flex-direction:column; }
  .topbar { display:flex; align-items:center; justify-content:space-between; gap:16px;
            padding:18px 30px; border-bottom:1px solid var(--line); background:var(--bg2);
            position:sticky; top:0; z-index:20; }
  .tb-title { font-size:21px; font-weight:800; letter-spacing:-.02em; }
  .tb-sub { font-size:13px; color:var(--muted); margin-top:2px; }
  .tb-right { display:flex; align-items:center; gap:12px; flex:none; }
  .tb-badge { font-size:12.5px; color:var(--muted); background:var(--card2);
              border:1px solid var(--line); padding:8px 13px; border-radius:20px;
              display:inline-flex; align-items:center; gap:7px; }
  .tb-badge .dotlive { width:7px; height:7px; border-radius:50%; background:var(--amber); }
  .btn-dark { display:inline-flex; align-items:center; gap:8px; background:var(--ink); color:#fff;
              font-size:14px; font-weight:700; padding:11px 18px; border-radius:11px; transition:.12s; }
  .btn-dark:hover { filter:brightness(1.15); transform:translateY(-1px); }

  .content { padding:28px 30px 64px; flex:1; }
  .content-inner { max-width:1280px; margin:0 auto; }

  /* entry cards (overview) */
  .entry-grid { display:grid; gap:18px; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); }
  .entry { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:24px;
           box-shadow:var(--shadow); cursor:pointer; transition:.15s; text-align:left; width:100%;
           color:var(--fg); }
  .entry:hover { transform:translateY(-2px); box-shadow:var(--shadow2); border-color:#e0e1e3; }
  .entry .eic { width:46px; height:46px; border-radius:13px; display:grid; place-items:center; margin-bottom:18px; }
  .entry .eic svg { width:22px; height:22px; stroke:currentColor; fill:none; }
  .entry h3 { font-size:18px; font-weight:800; letter-spacing:-.01em; }
  .entry p { font-size:13.5px; color:var(--muted); line-height:1.55; margin-top:8px; min-height:42px; }
  .entry .more { font-size:14px; font-weight:700; margin-top:16px; display:inline-flex; align-items:center; gap:6px; }

  /* Header (legacy, inside panels) */
  h1 { font-size:24px; margin:0; letter-spacing:.2px; }
  h1 span { color:var(--pink2); }

  /* Search panel */
  .panel { background:var(--card); border:1px solid var(--line);
           border-radius:16px; padding:18px; box-shadow:var(--shadow); }
  .searchrow { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .field { position:relative; flex:1; min-width:240px; }
  .field .at { position:absolute; left:14px; top:50%; transform:translateY(-50%);
               color:var(--muted); font-size:15px; font-family:var(--mono); }
  input[type=text], input:not([type]) {
    width:100%; padding:14px 15px 14px 30px; font-size:15px;
    border-radius:11px; border:1.5px solid var(--line); background:var(--bg2);
    color:var(--fg); outline:none; transition:.15s; font-family:inherit;
  }
  input.nopad { padding-left:15px; }
  input[type=text]:focus, input:not([type]):focus {
    border-color:var(--ink); box-shadow:0 0 0 3px rgba(22,24,29,.06); }
  button {
    padding:14px 24px; font-size:15px; font-weight:700; border:none;
    border-radius:11px; cursor:pointer; color:#fff; transition:.15s;
    background:var(--pink2); font-family:inherit;
  }
  button:hover { filter:brightness(1.07); transform:translateY(-1px); }
  button:active { transform:translateY(0); }
  button:disabled { opacity:.5; cursor:not-allowed; transform:none; filter:none; }
  button.ghost { background:transparent; border:1px solid var(--line); color:var(--fg); font-weight:600; }
  button.ghost:hover { border-color:var(--ink); background:var(--card2); }
  /* Mode toggle (sub-tabs e.g. transcript single/bulk) */
  .modes { display:flex; gap:5px; margin-bottom:14px; background:var(--input);
           border:1px solid var(--line); border-radius:11px; padding:4px; width:max-content; max-width:100%; flex-wrap:wrap; }
  .mode { background:transparent; color:var(--muted); font-weight:600;
          padding:9px 18px; border-radius:8px; font-size:14px; }
  .mode:hover { transform:none; filter:none; color:var(--fg); }
  .mode.active { background:var(--ink); color:#fff; }
  .mode.active:hover { color:#fff; }
  .opts { display:flex; gap:22px; align-items:center; margin-top:13px;
          color:var(--muted); font-size:13.5px; flex-wrap:wrap; }
  .daterange { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .daterange input[type=date] { padding:9px 11px; border-radius:9px;
        border:1px solid var(--line); background:var(--bg2); color:var(--fg);
        font-size:13.5px; outline:none; font-family:inherit; }
  .daterange input[type=date]:focus { border-color:var(--ink); }
  button.small { padding:8px 13px; font-size:13px; font-weight:600; }
  .note { margin-top:13px; color:var(--muted); font-size:12.5px; line-height:1.5; }
  .check { display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; }
  .check input { width:16px; height:16px; accent-color:var(--pink2); cursor:pointer; }

  .status { margin:16px 2px 0; min-height:20px; color:var(--muted); font-size:14px; }
  .status.err { color:#d92d4b; }
  .status.ok { color:var(--green); }
  .spinner { display:inline-block; width:14px; height:14px; border:2px solid var(--line);
             border-top-color:var(--pink2); border-radius:50%;
             animation:spin .8s linear infinite; vertical-align:-2px; margin-right:8px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

  .hidden { display:none !important; }
  section { margin-top:20px; }
  .sec-title { font-size:13px; text-transform:uppercase; letter-spacing:1.2px;
               color:var(--muted2); margin:0 0 12px 2px; font-weight:700; }

  /* Profile card */
  .profile { display:flex; gap:18px; align-items:flex-start; flex-wrap:wrap; }
  .pf-av { width:58px; height:58px; border-radius:50%; flex:none; background:var(--ink);
           color:#fff; display:grid; place-items:center; font-size:20px; font-weight:800; }
  .pf-avimg { object-fit:cover; background:var(--card2); border:1px solid var(--line); }
  .pf-side { display:flex; flex-direction:column; align-items:flex-end; gap:8px; flex:none; }
  .pf-meta { font-size:12px; color:var(--muted2); font-family:var(--mono); text-align:right; }
  .btn-ghost { background:transparent; border:1px solid var(--line); color:var(--fg);
               font-size:13px; font-weight:700; padding:9px 15px; border-radius:10px;
               text-decoration:none; transition:.12s; white-space:nowrap; }
  .btn-ghost:hover { border-color:var(--ink); background:var(--card2); }
  .pf-main { flex:1; min-width:260px; }
  .pf-name { display:flex; align-items:center; gap:9px; flex-wrap:wrap; }
  .pf-name h2 { margin:0; font-size:22px; }
  .verified { width:18px; height:18px; flex:none; }
  .pf-user { color:var(--muted); font-size:14px; margin-top:2px; font-family:var(--mono); }
  .pf-user a { color:var(--muted); text-decoration:none; }
  .pf-user a:hover { text-decoration:underline; color:var(--fg); }
  .pf-bio { color:var(--muted); font-size:14px; margin-top:10px; white-space:pre-wrap;
            line-height:1.5; max-width:640px; }
  .pf-stats { display:flex; gap:26px; flex-wrap:wrap; margin-top:12px; }
  .pf-stat { text-align:center; }
  .pf-stat b { display:block; font-size:20px; }
  .pf-stat span { color:var(--muted); font-size:12.5px; }

  /* Video detail header */
  .vhead { display:flex; gap:18px; flex-wrap:wrap; }
  .vcover { width:120px; height:160px; object-fit:cover; border-radius:10px;
            background:var(--card2); border:1px solid var(--line); flex:none; }
  .vmeta { flex:1; min-width:240px; }
  .vdesc { font-size:15px; line-height:1.5; margin-bottom:12px; white-space:pre-wrap; }
  .vsub { color:var(--muted); font-size:13px; margin-top:3px; }
  .vmeta .tags { margin:12px 0; }
  td.ctext { max-width:520px; min-width:260px; white-space:pre-wrap; }

  /* Transcript */
  .tselect { padding:8px 11px; border-radius:9px; border:1px solid var(--line);
             background:var(--bg2); color:var(--fg); font-size:13.5px; outline:none; cursor:pointer; font-family:inherit; }
  .tselect:focus { border-color:var(--ink); }
  pre.transcript { margin:0; white-space:pre-wrap; word-break:break-word;
                   font-family:inherit; font-size:14.5px; line-height:1.75; color:var(--fg);
                   max-height:56vh; overflow:auto; }
  .trmode { background:transparent; color:var(--muted); font-weight:600;
            padding:8px 16px; border-radius:8px; font-size:13.5px; }
  .trmode:hover { transform:none; filter:none; color:var(--fg); }
  .trmode.active { background:var(--ink); color:#fff; }
  .trmode.active:hover { color:#fff; }
  .bulkarea { width:100%; min-height:120px; padding:12px 14px; border-radius:11px;
              border:1.5px solid var(--line); background:var(--bg2); color:var(--fg);
              font-size:14px; font-family:inherit; outline:none; resize:vertical; }
  .bulkarea:focus { border-color:var(--ink); }
  .trprev { margin-top:6px; color:#b07400; font-size:12px; line-height:1.5; }
  .trbox { margin-top:8px; background:var(--card2); border:1px solid var(--line);
           border-radius:10px; padding:12px 14px; }
  pre.trinline { margin:8px 0 0; white-space:pre-wrap; word-break:break-word;
                 font-family:inherit; font-size:13.5px; line-height:1.7; color:var(--fg);
                 max-height:40vh; overflow:auto; }

  /* Overview metric cards */
  .cards { display:grid; gap:14px; grid-template-columns:repeat(auto-fit,minmax(165px,1fr)); }
  .metric { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px 17px; }
  .metric.accent { background:var(--ink); border-color:var(--ink); color:#fff; }
  .metric.accent .k, .metric.accent .sub { color:#9aa0a7; }
  .metric .k { color:var(--muted); font-size:12.5px; display:flex; align-items:center; gap:7px; }
  .metric .v { font-size:24px; font-weight:800; margin-top:7px; letter-spacing:.3px; }
  .metric .sub { color:var(--muted2); font-size:12px; margin-top:3px; }
  .dot { width:8px; height:8px; border-radius:50%; flex:none; }

  /* Charts */
  .charts { display:grid; gap:14px; grid-template-columns:1fr 1fr; }
  @media (max-width:880px) { .charts { grid-template-columns:1fr; } }
  .chart { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px 18px; }
  .chart-title { font-size:12.5px; color:var(--muted); margin-bottom:16px; font-weight:600; }
  .chart-hint { color:var(--muted2); font-weight:400; font-size:11.5px; }
  .vbars { display:flex; align-items:flex-end; gap:6px; height:150px; overflow-x:auto; padding-bottom:2px; }
  .vbars.noscroll { overflow:visible; }
  .plot { position:relative; }
  .erline { position:absolute; left:0; top:0; width:100%; height:150px; pointer-events:none; overflow:visible; }
  .vbar { flex:1 0 18px; display:flex; flex-direction:column; align-items:center;
          justify-content:flex-end; height:100%; gap:6px; cursor:pointer; }
  .vbar .fill { width:100%; max-width:30px; min-height:2px; border-radius:5px 5px 0 0;
                background:#d4d6da; transition:height .25s, background .15s; }
  .vbar:hover .fill { background:#bcbfc4; }
  .vbar.sel .fill { background:var(--pink2) !important; }
  .vbar .lbl { font-size:10px; color:var(--muted2); white-space:nowrap; font-family:var(--mono); }
  .hbars { display:flex; flex-direction:column; gap:9px; }
  .hbar { display:grid; grid-template-columns:110px 1fr 40px; align-items:center; gap:10px; font-size:12.5px; cursor:pointer; }
  .hbar:hover .name { color:var(--pink2); }
  .hbar.sel .fillh { outline:2px solid var(--ink); outline-offset:1px; }
  .hbar .name { color:var(--fg); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .hbar .track { background:var(--input); border:1px solid var(--line); border-radius:6px; height:15px; overflow:hidden; }
  .hbar .fillh { height:100%; border-radius:6px; min-width:2px;
                 background:var(--pink2); transition:width .25s; }
  .hbar .val { color:var(--muted); text-align:right; font-variant-numeric:tabular-nums; font-family:var(--mono); }
  .chart .empty { padding:18px; }

  /* Table */
  .toolbar { display:flex; justify-content:space-between; align-items:center;
             gap:12px; flex-wrap:wrap; margin-bottom:12px; }
  .toolbar .left { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .filter { position:relative; }
  .filter input { padding:10px 12px 10px 32px; min-width:230px; font-size:14px;
                  border-radius:10px; border:1px solid var(--line);
                  background:var(--bg2); color:var(--fg); outline:none; font-family:inherit; }
  .filter input:focus { border-color:var(--ink); }
  .filter .ic { position:absolute; left:11px; top:50%; transform:translateY(-50%);
                color:var(--muted2); }
  .count-pill { font-size:13px; color:var(--muted); background:var(--card2);
                border:1px solid var(--line); padding:7px 12px; border-radius:9px; }
  .count-pill b { color:var(--fg); }
  .drillbar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
  .chip { font-size:13px; color:var(--pink2); background:#fff0f3;
          border:1px solid #ffd4dd; padding:6px 12px; border-radius:20px;
          display:inline-flex; align-items:center; gap:8px; }

  .tablewrap { border:1px solid var(--line); border-radius:14px; overflow:auto;
               max-height:64vh; background:var(--card); }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th, td { text-align:left; padding:11px 13px; border-bottom:1px solid var(--line2); vertical-align:top; }
  thead th { color:var(--muted); font-weight:600; position:sticky; top:0; z-index:2;
             background:var(--card2); cursor:pointer; user-select:none; white-space:nowrap;
             font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
  thead th.nosort { cursor:default; }
  thead th:hover { color:var(--fg); }
  thead th .arrow { color:var(--pink2); font-size:11px; }
  tbody tr:hover { background:#fafafb; }
  td.num { text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap; }
  td.idx { color:var(--muted2); font-family:var(--mono); }
  td.desc { max-width:440px; min-width:260px; }
  .vrow { display:flex; gap:11px; align-items:flex-start; }
  .vrowtxt { min-width:0; }
  .vthumb { width:42px; height:56px; flex:none; border-radius:8px; border:1px solid var(--line);
            background:linear-gradient(160deg,#f0f1f3,#e3e5e8); color:var(--muted2);
            display:grid; place-items:center; text-decoration:none; transition:.12s; }
  .vthumb svg { width:16px; height:16px; }
  .vthumb:hover { color:var(--pink2); border-color:#ffd4dd; }
  .tags { margin-top:6px; display:flex; flex-wrap:wrap; gap:5px; }
  .tag { font-size:11.5px; color:var(--muted); background:var(--input);
         border:1px solid var(--line); padding:1px 8px; border-radius:20px; }
  .er { font-size:12px; padding:2px 7px; border-radius:6px; font-weight:600; }
  a.open { color:var(--blue); text-decoration:none; font-weight:600; }
  a.open:hover { text-decoration:underline; }
  .empty { text-align:center; color:var(--muted); padding:30px; }
  .rowbtns { display:flex; flex-direction:column; gap:6px; align-items:stretch; }

  /* Tag / keyword cloud */
  .cloud { display:flex; flex-wrap:wrap; gap:7px 10px; align-items:center; padding:3px 1px; }
  .cloud .cw { cursor:pointer; color:#3f444b; line-height:1.25; white-space:nowrap;
               display:inline-flex; align-items:baseline; gap:5px; padding:2px 8px;
               border:1px solid transparent; border-radius:9px; transition:.15s; font-weight:600; }
  .cloud .cw:hover { color:var(--ink); background:var(--card2); border-color:var(--line); }
  .cloud .cw.sel { color:#fff; background:var(--ink); border-color:var(--ink); }
  .cloud .cw .cn { font-size:10.5px; color:var(--muted2); font-variant-numeric:tabular-nums; font-family:var(--mono); }
  .cloud.kw .cw { color:var(--pink2); }
  .cloud.kw .cw:hover { background:#fff0f3; border-color:#ffd4dd; }
  .cloud.kw .cw.sel { color:#fff; background:var(--pink2); border-color:var(--pink2); }
  .cloud.kw .cw.sel .cn { color:#ffd4dd; }

  /* Platform badge (Social tab) */
  .plat { display:inline-block; padding:3px 11px; border-radius:7px; font-size:12px;
          font-weight:700; color:#fff; letter-spacing:.3px; }

  /* Overview home — result + jobs grid */
  .ov-grid { display:grid; gap:18px; grid-template-columns:1.3fr 1fr; margin-top:18px; }
  @media (max-width:920px) { .ov-grid { grid-template-columns:1fr; } }
  .linkbtn { background:transparent; color:var(--pink2); font-size:13px; font-weight:700; padding:0; }
  .linkbtn:hover { transform:none; filter:none; text-decoration:underline; }

  /* Job rows (overview "Job gần đây" + history) */
  .joblist { display:flex; flex-direction:column; }
  .jobrow { display:flex; align-items:center; gap:12px; padding:11px 6px; border-top:1px solid var(--line2); cursor:pointer; transition:.1s; }
  .jobrow:first-child { border-top:none; }
  .jobrow:hover { background:var(--card2); }
  .jobrow-main { flex:1; min-width:0; }
  .hicon { width:30px; height:30px; flex:none; border-radius:8px; display:grid; place-items:center;
           font-size:13px; font-weight:800; font-family:var(--mono); background:var(--card2);
           border:1px solid var(--line); color:var(--muted); }
  .hicon.t-account { color:var(--pink2); background:#fff0f3; border-color:#ffd4dd; }
  .hicon.t-link { color:var(--blue); background:#eef3ff; border-color:#d6e2ff; }
  .hicon.t-social { color:var(--amber); background:#fff7e8; border-color:#ffe6bf; }
  .hicon.t-transcript { color:var(--green); background:#eafaf1; border-color:#c8f0d8; }
  .htarget { font-size:13.5px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .hsub { font-size:12px; color:var(--muted2); }
  .jobdot { width:8px; height:8px; border-radius:50%; flex:none; }
  .jobdot.ok { background:var(--green); } .jobdot.err { background:var(--pink2); }
  .hrow { display:flex; align-items:center; gap:11px; }
  .badge-ok { font-size:11.5px; font-weight:700; color:var(--green); background:#eafaf1;
              border:1px solid #c8f0d8; padding:3px 10px; border-radius:7px; }
  .badge-err { font-size:11.5px; font-weight:700; color:#d92d4b; background:#fff0f3;
               border:1px solid #ffd4dd; padding:3px 10px; border-radius:7px; }

  /* Card header (Link / Transcript input panels) */
  .card-head { display:flex; align-items:flex-start; justify-content:space-between; gap:14px; flex-wrap:wrap; }
  .card-h { font-size:16px; font-weight:800; letter-spacing:-.01em; }
  .card-sub { font-size:13px; color:var(--muted); margin-top:4px; max-width:560px; line-height:1.5; }
  .card-hint { font-size:12px; color:var(--muted2); white-space:nowrap; }
  .chips { display:flex; flex-wrap:wrap; gap:8px; }
  .exchip { font-size:12.5px; color:var(--muted); background:var(--card2); border:1px solid var(--line);
            padding:6px 12px; border-radius:8px; }

  /* Engagement breakdown bars */
  .breakdown { display:flex; flex-direction:column; gap:14px; }
  .bd-row { display:grid; grid-template-columns:90px 1fr 110px; align-items:center; gap:14px; }
  .bd-name { font-size:13px; font-weight:600; }
  .bd-track { height:10px; background:var(--input); border-radius:6px; overflow:hidden; }
  .bd-fill { height:100%; border-radius:6px; min-width:3px; transition:width .3s; }
  .bd-val { font-size:13px; color:var(--muted); text-align:right; font-family:var(--mono); }

  /* Modal */
  .modal-overlay { position:fixed; inset:0; background:rgba(16,24,40,.45); backdrop-filter:blur(3px);
                   z-index:50; display:flex; align-items:flex-start; justify-content:center;
                   padding:40px 16px; overflow:auto; animation:fade .15s ease; }
  @keyframes fade { from { opacity:0; } to { opacity:1; } }
  .modal { background:var(--bg2); border:1px solid var(--line); border-radius:16px;
           box-shadow:var(--shadow2); width:100%; max-width:1080px; margin:auto;
           display:flex; flex-direction:column; max-height:88vh; overflow:hidden;
           animation:fade .18s ease; }
  .modal-head { display:flex; align-items:center; justify-content:space-between; gap:12px;
                padding:15px 18px; border-bottom:1px solid var(--line); flex:none; }
  .modal-title { display:flex; align-items:center; flex-wrap:wrap; gap:10px; font-size:15px; font-weight:700; }
  .modal-x { background:transparent; border:1px solid var(--line); color:var(--fg);
             font-size:14px; padding:7px 13px; border-radius:9px; font-weight:600; }
  .modal-x:hover { border-color:var(--pink2); color:var(--pink2); background:#fff0f3;
                   transform:none; filter:none; }
  .modal-body { padding:16px 18px; overflow:auto; }

  /* Comment replies (nested) */
  .reply-toggle { margin-top:7px; color:var(--blue); font-size:12px; cursor:pointer;
                  user-select:none; display:inline-flex; align-items:center; gap:5px; font-weight:600; }
  .reply-toggle:hover { text-decoration:underline; }
  tr.replyrow td { background:var(--card2); }
  tr.replyrow .reply-user { padding-left:20px; }
  tr.replyrow .reply-user .arr { color:var(--muted2); margin-right:4px; }
  tr.replyrow .ctext { color:var(--muted); }

  /* JSON panel */
  pre.json { margin:0; padding:16px; background:var(--card2); border:1px solid var(--line);
             border-radius:12px; max-height:420px; overflow:auto; font-size:12.5px;
             color:#3f444b; line-height:1.5; font-family:var(--mono); }
  .footer { text-align:center; color:var(--muted2); font-size:12.5px; margin-top:40px; }

  /* =============================================== automation layer ====== */
  /* status pill (jobs queue) */
  .stpill { display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:700;
            padding:3px 10px; border-radius:7px; white-space:nowrap; }
  .stpill .spinner { width:11px; height:11px; margin-right:0; }
  .st-queued   { color:var(--muted);  background:var(--card2); border:1px solid var(--line); }
  .st-running  { color:var(--blue);   background:#eef3ff; border:1px solid #d6e2ff; }
  .st-success  { color:var(--green);  background:#eafaf1; border:1px solid #c8f0d8; }
  .st-error    { color:#d92d4b;       background:#fff0f3; border:1px solid #ffd4dd; }
  .st-canceled { color:var(--muted2); background:var(--card2); border:1px solid var(--line); }

  /* toggle switch (schedules / alerts enable) */
  .toggle { width:38px; height:22px; border-radius:20px; background:#d4d6da; padding:0;
            position:relative; transition:.15s; flex:none; }
  .toggle:hover { filter:none; transform:none; }
  .toggle span { position:absolute; top:3px; left:3px; width:16px; height:16px; border-radius:50%;
                 background:#fff; transition:.15s; box-shadow:0 1px 2px rgba(0,0,0,.2); }
  .toggle.on { background:var(--green); }
  .toggle.on span { left:19px; }

  /* notification bell */
  .bell-wrap { position:relative; }
  .bell { position:relative; width:42px; height:42px; padding:0; border-radius:11px;
          background:var(--card2); border:1px solid var(--line); color:#3f444b;
          display:grid; place-items:center; }
  .bell:hover { background:#fff; border-color:var(--ink); color:var(--ink); transform:none; filter:none; }
  .bell svg { width:19px; height:19px; stroke:currentColor; }
  .bell-badge { position:absolute; top:-5px; right:-5px; min-width:18px; height:18px; padding:0 5px;
                border-radius:9px; background:var(--pink2); color:#fff; font-size:10px; font-weight:800;
                display:grid; place-items:center; font-family:var(--mono); border:2px solid var(--bg2); }
  .bell-pop { position:absolute; right:0; top:50px; width:360px; max-width:88vw; background:var(--bg2);
              border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow2); z-index:60;
              overflow:hidden; animation:fade .15s ease; }
  .bell-head { display:flex; align-items:center; justify-content:space-between;
               padding:13px 16px; border-bottom:1px solid var(--line); font-size:14px; }
  .bell-list { max-height:60vh; overflow-y:auto; }
  .bell-item { display:flex; gap:11px; padding:12px 16px; border-top:1px solid var(--line2); cursor:pointer; transition:.1s; }
  .bell-item:first-child { border-top:none; }
  .bell-item:hover { background:var(--card2); }
  .bell-item.unread { background:#fafbff; }
  .bell-dot { width:8px; height:8px; border-radius:50%; flex:none; margin-top:6px; }
  .bell-main { min-width:0; flex:1; }
  .bell-title { font-size:13.5px; font-weight:700; line-height:1.4; }
  .bell-body { font-size:12.5px; color:var(--muted); margin-top:3px; line-height:1.45; }
  .bell-time { font-size:11px; color:var(--muted2); margin-top:5px; font-family:var(--mono); }

  /* competitor cards */
  .cmp-grid { display:grid; gap:14px; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); }
  .cmp-card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:16px;
              box-shadow:var(--shadow); cursor:pointer; transition:.15s; }
  .cmp-card:hover { transform:translateY(-2px); box-shadow:var(--shadow2); }
  .cmp-card.sel { border-color:var(--ink); box-shadow:0 0 0 2px var(--ink) inset, var(--shadow); }
  .cmp-top { display:flex; align-items:center; gap:11px; }
  .cmp-av { width:40px; height:40px; border-radius:50%; flex:none; color:#fff; display:grid;
            place-items:center; font-size:14px; font-weight:800; }
  .cmp-id { flex:1; min-width:0; }
  .cmp-name { font-size:15px; font-weight:800; letter-spacing:-.01em; overflow:hidden;
              text-overflow:ellipsis; white-space:nowrap; }
  .cmp-check { width:22px; height:22px; flex:none; border-radius:50%; border:1.5px solid var(--line);
               display:grid; place-items:center; color:#fff; font-size:13px; font-weight:800; }
  .cmp-check.on { background:var(--ink); border-color:var(--ink); }
  .cmp-metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:14px; }
  .cmp-metrics b { display:block; font-size:18px; font-weight:800; font-family:var(--mono); }
  .cmp-metrics span { font-size:11.5px; color:var(--muted); }
  .cmp-foot { display:flex; align-items:center; justify-content:space-between; gap:8px;
              margin-top:14px; padding-top:12px; border-top:1px solid var(--line2); }
  .cmp-legend { display:flex; flex-wrap:wrap; gap:14px; margin-bottom:10px; }
  .leg { display:inline-flex; align-items:center; gap:7px; font-size:13px; font-weight:600; }
  .leg-dot { width:10px; height:10px; border-radius:50%; flex:none; }

  /* month chart: shrink bars to fit the panel so a long history never overflows
     and breaks the 2-column charts grid */
  .charts { grid-template-columns:1.55fr 1fr; }
  @media (max-width:880px) { .charts { grid-template-columns:1fr; } }
  .vbars.fit { gap:3px; }
  .vbars.fit .vbar { flex:1 1 0; min-width:0; }
  .vbars.fit .vbar .fill { max-width:26px; }
  .vbars.fit .vbar .lbl { font-size:9px; }

  /* collapsed input bar (shown after an analysis completes) */
  .input-collapsed { display:flex; align-items:center; justify-content:space-between; gap:12px;
                     flex-wrap:wrap; padding:2px 2px 2px 0; }
  .input-collapsed .ic-info { display:flex; align-items:center; gap:11px; font-size:14.5px; color:var(--muted); }
  .input-collapsed .ic-info b { color:var(--fg); }
  .input-collapsed .ic-badge { width:34px; height:34px; border-radius:10px; flex:none; display:grid;
              place-items:center; background:#fff0f3; color:var(--pink2); border:1px solid #ffd4dd;
              font-weight:800; font-family:var(--mono); }

  /* section header row with an inline action (hashtag expand/collapse) */
  .sec-row { display:flex; align-items:center; justify-content:space-between; gap:12px;
             margin:0 2px 12px; flex-wrap:wrap; }
  .sec-row .sec-title { margin:0; }
  .more-tags { margin-top:12px; background:transparent; color:var(--pink2); font-size:13px;
               font-weight:700; padding:8px 0 0; }
  .more-tags:hover { transform:none; filter:none; text-decoration:underline; }

  /* ============================ custom tooltips (data-tip) ================= */
  [data-tip] { position:relative; }
  [data-tip]:hover::after {
    content:attr(data-tip);
    position:absolute; bottom:calc(100% + 9px); left:50%;
    background:var(--ink); color:#fff; font-family:var(--sans); font-size:12px; font-weight:600;
    line-height:1.5; white-space:pre; text-align:center; padding:8px 12px; border-radius:10px;
    box-shadow:var(--shadow2); z-index:45; pointer-events:none; max-width:280px;
    animation:tipIn .12s ease both;
  }
  [data-tip]:hover::before {
    content:""; position:absolute; bottom:calc(100% + 3px); left:50%; transform:translateX(-50%);
    border:6px solid transparent; border-top-color:var(--ink); z-index:45; pointer-events:none;
    animation:tipIn .12s ease both;
  }
  @keyframes tipIn { from { opacity:0; transform:translate(-50%,5px); } to { opacity:1; transform:translate(-50%,0); } }

  /* ===================== density pass — tighter spacing ================== */
  .content { padding:18px 24px 40px; }
  .topbar { padding:13px 24px; }
  section { margin-top:14px; }
  .panel { padding:15px 16px; }
  .panel.slim { padding:11px 14px; }
  .cards { gap:12px; }
  .metric { padding:13px 15px; }
  .metric .v { margin-top:5px; font-size:23px; }
  .charts { gap:12px; }
  .chart { padding:14px 16px; }
  .chart-title { margin-bottom:12px; }
  #singleInputs .opts { margin-top:10px; }
  #singleInputs .note { margin-top:10px; }

  /* topbar back/forward nav */
  .tb-left { display:flex; align-items:center; gap:14px; min-width:0; }
  .navbtns { display:flex; gap:5px; flex:none; }
  .navbtn { width:34px; height:34px; padding:0; border-radius:9px; background:var(--card2);
            border:1px solid var(--line); color:#3f444b; display:grid; place-items:center; }
  .navbtn svg { width:18px; height:18px; stroke:currentColor; }
  .navbtn:hover:not(:disabled) { background:#fff; border-color:var(--ink); color:var(--ink);
            transform:none; filter:none; }
  .navbtn:disabled { opacity:.35; cursor:not-allowed; }

  /* ===================== video table — bolder, denser ==================== */
  .tablewrap { border-radius:16px; box-shadow:var(--shadow); }
  thead th { background:#f4f4f6; font-size:11.5px; border-bottom:1.5px solid var(--line); padding:12px 13px; }
  .vtr { transition:background .1s; }
  .vtr:hover { background:#fff7f9; }
  .vtr > td { padding:13px; border-bottom:1px solid var(--line2); }
  td.idx .rank { display:inline-grid; place-items:center; width:25px; height:25px; border-radius:8px;
            background:var(--card2); border:1px solid var(--line); color:var(--muted); font-size:12px;
            font-weight:800; font-family:var(--mono); }
  td.idx .rank.top { background:#fff0f3; border-color:#ffd4dd; color:var(--pink2); }
  td.vviews { font-weight:800; color:var(--fg); font-size:14.5px; }
  td.vdate { color:var(--muted); font-size:12.5px; white-space:nowrap; font-family:var(--mono); }
  .er { padding:3px 9px; border-radius:7px; font-weight:700; display:inline-block; }
  .vthumb { width:46px; height:62px; }
  .vthumb svg { width:18px; height:18px; }

  /* ===================== month chart zoom / range bar ==================== */
  .zoomwrap { margin-top:14px; padding-top:12px; border-top:1px solid var(--line2); }
  .zoombar { position:relative; height:34px; }
  .zb-track { position:absolute; left:0; right:0; top:5px; bottom:5px; background:var(--input);
              border:1px solid var(--line); border-radius:7px; overflow:hidden; }
  .zb-b { position:absolute; bottom:0; background:#dcdee2; }
  .zb-b.in { background:#9aa0c0; background:var(--pink2); opacity:.45; }
  .zb-sel { position:absolute; top:0; bottom:0; background:rgba(240,44,86,.08);
            border-left:2px solid var(--pink2); border-right:2px solid var(--pink2); }
  .zb-range { -webkit-appearance:none; appearance:none; position:absolute; left:-7px; right:-7px;
              top:0; width:calc(100% + 14px); height:34px; margin:0; background:none; pointer-events:none; }
  .zb-range::-webkit-slider-thumb { -webkit-appearance:none; pointer-events:auto; cursor:ew-resize;
              width:14px; height:30px; border-radius:6px; background:#fff; border:1.5px solid var(--pink2);
              box-shadow:var(--shadow); }
  .zb-range::-moz-range-thumb { pointer-events:auto; cursor:ew-resize; width:14px; height:30px;
              border-radius:6px; background:#fff; border:1.5px solid var(--pink2); box-shadow:var(--shadow); }
  .zb-range::-webkit-slider-runnable-track { background:none; border:none; }
  .zb-range::-moz-range-track { background:none; border:none; }
  .zb-foot { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:6px;
             font-size:12px; color:var(--muted); font-family:var(--mono); }
</style>
</head>

<div id="root"></div>

<script src="/static/vendor/react-dom.production.min.js"></script>
