<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>TikTok Transcript Generator</title>
    <style>
      body {
        margin: 0;
        min-width: 320px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #121212;
        color: #fff;
      }
      .wrap {
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      h1 {
        margin: 0;
        font-size: 15px;
      }
      label {
        font-size: 12px;
        color: #bbb;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #333;
        border-radius: 8px;
        background: #1e1e1e;
        color: #fff;
        padding: 8px 10px;
        font-size: 12px;
      }
      button {
        border: 0;
        border-radius: 8px;
        background: #ff004f;
        color: #fff;
        font-weight: 600;
        padding: 9px 10px;
        cursor: pointer;
      }
      button:hover {
        background: #e60046;
      }
      #status {
        font-size: 12px;
        min-height: 16px;
        color: #7cc4ff;
      }
      .hint {
        font-size: 11px;
        line-height: 1.4;
        color: #9a9a9a;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>TikTok Transcript Generator</h1>

      <label for="apiBaseUrl">API Base URL</label>
      <input id="apiBaseUrl" type="text" placeholder="http://127.0.0.1:3010" />

      <label for="extensionToken">Extension Token</label>
      <input id="extensionToken" type="password" placeholder="x-extension-token value" />

      <button id="saveBtn" type="button">Save</button>
      <div id="status"></div>

      <div class="hint">
        Endpoint used by content script:<br />
        <code>/api/ext/v1/transcript</code>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
